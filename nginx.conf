# Nginx configuration for SSHVE2 Dashboard
# Nginx用の設定ファイル（リバースプロキシ）

upstream sshve2_dashboard {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Max upload size
    client_max_body_size 100M;

    # Logging
    access_log /var/log/nginx/sshve2_dashboard_access.log;
    error_log /var/log/nginx/sshve2_dashboard_error.log;

    # Static files (if any)
    location /static/ {
        alias /path/to/your/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://sshve2_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

